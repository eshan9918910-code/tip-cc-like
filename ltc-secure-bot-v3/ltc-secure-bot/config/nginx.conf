# /etc/nginx/sites-available/ltc-tip-bot
# Replace yourdomain.com everywhere, then:
#   sudo ln -s /etc/nginx/sites-available/ltc-tip-bot /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d yourdomain.com
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com;

    # ── SSL (Certbot fills these in) ───────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ───────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           DENY                                           always;
    add_header X-Content-Type-Options    nosniff                                        always;
    add_header X-XSS-Protection          "1; mode=block"                               always;

    # ── Rate limiting zone ─────────────────────────────
    # Defined in /etc/nginx/nginx.conf http block:
    #   limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # ── Health check (public, no auth) ─────────────────
    location = /health {
        proxy_pass         http://127.0.0.1:3000/health;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── Block ALL /api/ from the public internet ───────
    # The bot talks to the API directly on 127.0.0.1, never via Nginx.
    # This location exists only to explicitly block accidental exposure.
    location /api/ {
        deny all;
        return 403;
    }

    # ── Block everything else ──────────────────────────
    location / {
        return 404;
    }

    # ── Logging ────────────────────────────────────────
    access_log /var/log/nginx/ltc-tip-bot-access.log;
    error_log  /var/log/nginx/ltc-tip-bot-error.log;
}
